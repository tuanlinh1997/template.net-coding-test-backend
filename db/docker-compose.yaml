
services:
  mysql:
    image: mysql:8.0
    container_name: mysql-container
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root@123
      MYSQL_DATABASE: template_net
      MYSQL_USER: template_net
      MYSQL_PASSWORD: template@net
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
    driver: local